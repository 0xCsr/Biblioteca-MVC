<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Login - Sistema de Biblioteca</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<script src="js/navigation.js" defer></script>
<script src="js/pages.js" defer></script>

</head>
<body data-page="login">
  <main class="app">

    <h1 class="page-title">Login</h1>
    <section class="form-shell">
      <form id="login-form" class="form-stack" novalidate>
        <input class="field" id="login" type="text" placeholder="Login" autocomplete="username">
        <input class="field" id="senha" type="password" placeholder="Senha" autocomplete="current-password">
        <div class="button-row" style="justify-content:center;">
          <button class="btn btn-green" type="submit">Entrar</button>
        </div>
      </form>
      <p id="login-status" class="status"></p>
      <div class="hint-box"></div>
      <div class="prototype-links"><a href="wireframes/Tela Login.png" target="_blank">Wireframe da tela</a></div>
    </section>

  </main>
</body>
</html>
